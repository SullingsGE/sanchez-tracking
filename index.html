<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sánchez Tracking Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid white; font-weight: bold; background: #15803d; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <header class="bg-green-600 text-white sticky top-0 z-50 shadow-lg text-center">
        <div class="p-4">
            <h1 class="text-xl font-bold italic">Sánchez Tracking</h1>
            <p id="saldo-hoy" class="text-3xl font-bold text-yellow-300">$0</p>
            <p class="text-[10px] uppercase font-bold opacity-80 italic">Ingreso Bruto Hoy</p>
            <div class="w-full bg-green-800 h-2 mt-3 rounded-full overflow-hidden border border-green-700">
                <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
        <div class="flex bg-green-700">
            <button onclick="cambiarPantalla('carga')" id="tab-carga" class="flex-1 py-3 text-xs tab-active uppercase">Cargar</button>
            <button onclick="cambiarPantalla('ruta')" id="tab-ruta" class="flex-1 py-3 text-xs uppercase">Mi Ruta</button>
        </div>
    </header>

    <main id="pantalla-carga" class="p-4 max-w-md mx-auto space-y-4">
        <div class="bg-white p-5 rounded-xl shadow-md space-y-3 border-t-4 border-green-500">
            <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">📦 Nuevo Pedido</h2>
            <input type="text" id="cliente" placeholder="Cliente" class="w-full border p-2 rounded-lg outline-none">
            <input type="text" id="direccion" placeholder="Dirección" class="w-full border p-2 rounded-lg outline-none">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="valor" placeholder="Importe $" class="border p-2 rounded-lg font-bold text-green-700">
                <input type="text" id="comision" placeholder="Comisión" class="border p-2 rounded-lg text-blue-600 text-xs">
            </div>
            <button onclick="enviarComision()" id="btn-cargar" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold uppercase shadow active:scale-95 transition-all">Añadir a la Ruta</button>
        </div>

        <div class="bg-white p-5 rounded-xl shadow-md space-y-3 border-t-4 border-orange-400">
            <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">⛽ Carga de Combustible</h2>
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="gas-importe" placeholder="Importe $" class="border p-2 rounded-lg font-bold text-orange-600 bg-orange-50">
                <input type="number" id="gas-litros" placeholder="Litros" class="border p-2 rounded-lg text-orange-600 text-xs bg-orange-50">
            </div>
            <button onclick="enviarNafta()" id="btn-nafta" class="w-full bg-orange-500 text-white py-2 rounded-xl font-bold uppercase text-xs active:bg-orange-700">Registrar Carga</button>
        </div>

        <div class="bg-gray-800 text-white p-5 rounded-xl shadow-inner text-center space-y-3">
            <p class="text-[10px] uppercase opacity-60">Acumulado Histórico</p>
            <p id="saldo-historico" class="text-2xl font-mono">$0</p>
            <button onclick="generarPDF()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Descargar Cierre PDF</button>
        </div>
    </main>

    <main id="pantalla-ruta" class="p-4 max-w-md mx-auto hidden space-y-4">
        <div id="lista-viajes" class="space-y-3"></div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyg5E0ETapCoHz06VqkTVV6fNUEgt8EFrbuVYlTiycptHstCugvfc-F8400Y7Gj9U_MMg/exec"; 
        let datosHoy = [];
        let gastoNaftaHoy = 0;

        window.onload = actualizarTodo;

        function cambiarPantalla(p) {
            document.getElementById('pantalla-carga').classList.toggle('hidden', p !== 'carga');
            document.getElementById('pantalla-ruta').classList.toggle('hidden', p !== 'ruta');
            document.getElementById('tab-carga').classList.toggle('tab-active', p === 'carga');
            document.getElementById('tab-ruta').classList.toggle('tab-active', p === 'ruta');
            if(p === 'ruta') actualizarTodo();
        }

        function llamarGoogle(params, callbackName) {
            const script = document.createElement('script');
            const queryString = Object.keys(params).map(key => key + '=' + encodeURIComponent(params[key])).join('&');
            script.src = `${SCRIPT_URL}?${queryString}&callback=${callbackName}`;
            document.body.appendChild(script);
        }

        function enviarComision() {
            const c = document.getElementById('cliente'), d = document.getElementById('direccion'), v = document.getElementById('valor'), com = document.getElementById('comision');
            if(!c.value || !v.value) return alert("Faltan datos");
            document.getElementById('btn-cargar').innerText = "GUARDANDO...";
            llamarGoogle({accion: "AGREGAR_VIAJE", cliente: c.value, direccion: d.value, valor: v.value, comision: com.value}, "confirmarCarga");
        }

        function enviarNafta() {
            const imp = document.getElementById('gas-importe'), lit = document.getElementById('gas-litros');
            if(!imp.value) return alert("Ingresá el importe de la nafta");
            document.getElementById('btn-nafta').innerText = "REGISTRANDO...";
            llamarGoogle({accion: "CARGAR_NAFTA", importe: imp.value, litros: lit.value || 0}, "confirmarNafta");
        }

        window.confirmarCarga = () => {
            document.querySelectorAll('#pantalla-carga input').forEach(i => i.value = "");
            document.getElementById('btn-cargar').innerText = "Añadir a la Ruta";
            cambiarPantalla('ruta');
        };

        window.confirmarNafta = () => {
            document.getElementById('gas-importe').value = ""; document.getElementById('gas-litros').value = "";
            document.getElementById('btn-nafta').innerText = "Registrar Carga";
            alert("Combustible registrado con éxito");
            actualizarTodo();
        };

        function actualizarTodo() {
            llamarGoogle({}, "renderizarInterfaz");
        }

        window.renderizarInterfaz = (data) => {
            datosHoy = data.viajes;
            gastoNaftaHoy = data.nafta || 0;
            document.getElementById('saldo-hoy').innerText = `$${data.hoy.toLocaleString()}`;
            document.getElementById('saldo-historico').innerText = `$${data.historico.toLocaleString()}`;
            
            const listos = data.viajes.filter(v => v.estado === 'LISTO').length;
            const porcentaje = data.viajes.length > 0 ? (listos / data.viajes.length) * 100 : 0;
            document.getElementById('progress-bar').style.width = porcentaje + "%";

            const lista = document.getElementById('lista-viajes');
            lista.innerHTML = "";
            data.viajes.sort((a, b) => (a.estado === 'LISTO') - (b.estado === 'LISTO')).forEach(v => {
                const esListo = v.estado === 'LISTO';
                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-lg shadow border-l-4 ${esListo ? 'border-gray-200 opacity-40 grayscale' : 'border-green-500'} flex justify-between items-center`;
                div.innerHTML = `
                    <div class="text-left">
                        <h3 class="font-bold text-gray-800 uppercase text-xs">${v.cliente}</h3>
                        <p class="text-[10px] text-gray-400">${v.direccion}</p>
                        <p class="text-green-600 font-bold">$${v.valor}</p>
                    </div>
                    ${esListo ? '✅' : `<button onclick="marcarListo('${v.id}')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow">LISTO</button>`}
                `;
                lista.appendChild(div);
            });
        };

        function marcarListo(id) {
            llamarGoogle({accion: "COMPLETAR_VIAJE", id: id}, "actualizarTodo");
        }

        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const fecha = new Date().toLocaleDateString();
            
            doc.text("Sánchez Tracking - Cierre de Caja", 14, 20);
            doc.setFontSize(10);
            doc.text(`Fecha: ${fecha}`, 14, 28);

            const tableData = datosHoy.map(v => [v.cliente, v.comision, `$${v.valor}`]);
            const totalBruto = datosHoy.reduce((acc, curr) => acc + parseFloat(curr.valor), 0);
            const neto = totalBruto - gastoNaftaHoy;

            doc.autoTable({
                startY: 35,
                head: [['Cliente', 'Tipo', 'Importe']],
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [21, 128, 61] }
            });

            const finalY = doc.lastAutoTable.finalY + 10;
            doc.setFontSize(12);
            doc.text(`Recaudación Bruta: $${totalBruto.toLocaleString()}`, 14, finalY);
            doc.setTextColor(200, 0, 0);
            doc.text(`Gasto Combustible: -$${gastoNaftaHoy.toLocaleString()}`, 14, finalY + 7);
            doc.setTextColor(0, 100, 0);
            doc.setFontSize(14);
            doc.text(`TOTAL NETO A CAJA: $${neto.toLocaleString()}`, 14, finalY + 17);

            doc.save(`Cierre_${fecha}.pdf`);
        }
    </script>
</body>
</html>
