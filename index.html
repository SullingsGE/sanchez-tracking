<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sánchez Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid white; font-weight: bold; background: #15803d; }
        #progress-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <header class="bg-green-600 text-white sticky top-0 z-50 shadow-lg text-center">
        <div class="p-4">
            <h1 class="text-xl font-bold italic">Sánchez Tracking</h1>
            <p id="saldo-header" class="text-2xl font-bold text-yellow-300">$0</p>
            <div class="w-full bg-green-800 h-2 mt-2 rounded-full overflow-hidden border border-green-700">
                <div id="progress-bar" class="bg-red-500 h-full w-0"></div>
            </div>
        </div>
        <div class="flex bg-green-700">
            <button onclick="cambiarPantalla('carga')" id="tab-carga" class="flex-1 py-3 text-xs tab-active uppercase">Cargar</button>
            <button onclick="cambiarPantalla('ruta')" id="tab-ruta" class="flex-1 py-3 text-xs uppercase">Mi Ruta</button>
        </div>
    </header>

    <main id="pantalla-carga" class="p-4 max-w-md mx-auto space-y-4">
        <div class="bg-white p-5 rounded-xl shadow-md space-y-3">
            <input type="text" id="cliente" placeholder="Cliente" class="w-full border p-3 rounded-lg outline-none">
            <input type="text" id="direccion" placeholder="Dirección" class="w-full border p-3 rounded-lg outline-none">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="valor" placeholder="Valor $" class="border p-3 rounded-lg font-bold text-green-700">
                <input type="text" id="comision" placeholder="¿Qué es?" class="border p-3 rounded-lg text-blue-600 uppercase text-xs">
            </div>
            <button onclick="enviarComision()" id="btn-cargar" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold uppercase active:bg-green-800">Añadir Pedido</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="descargarExcel()" class="bg-blue-600 text-white py-3 rounded-lg text-xs font-bold uppercase shadow">Descargar Día</button>
            <button onclick="reiniciarDia()" class="bg-red-600 text-white py-3 rounded-lg text-xs font-bold uppercase shadow">Reiniciar Día</button>
        </div>
    </main>

    <main id="pantalla-ruta" class="p-4 max-w-md mx-auto hidden">
        <div id="lista-viajes" class="space-y-3 italic text-gray-400 text-center mt-10">Cargando...</div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyg5E0ETapCoHz06VqkTVV6fNUEgt8EFrbuVYlTiycptHstCugvfc-F8400Y7Gj9U_MMg/exec"; // REEMPLAZA ESTO
        let datosLocales = [];

        window.onload = actualizarTodo;

        function cambiarPantalla(p) {
            document.getElementById('pantalla-carga').classList.toggle('hidden', p !== 'carga');
            document.getElementById('pantalla-ruta').classList.toggle('hidden', p !== 'ruta');
            document.getElementById('tab-carga').classList.toggle('tab-active', p === 'carga');
            document.getElementById('tab-ruta').classList.toggle('tab-active', p === 'ruta');
            if(p === 'ruta') actualizarTodo();
        }

        // --- CONEXIÓN ULTRA-ESTABLE (JSONP) ---
        function llamarGoogle(params, callbackName) {
            const script = document.createElement('script');
            const queryString = Object.keys(params).map(key => key + '=' + encodeURIComponent(params[key])).join('&');
            script.src = `${SCRIPT_URL}?${queryString}&callback=${callbackName}`;
            document.body.appendChild(script);
        }

        function enviarComision() {
            const c = document.getElementById('cliente'), d = document.getElementById('direccion'), v = document.getElementById('valor'), com = document.getElementById('comision');
            if(!c.value || !v.value) return alert("Faltan datos");

            document.getElementById('btn-cargar').innerText = "GUARDANDO...";
            llamarGoogle({
                accion: "AGREGAR_VIAJE",
                cliente: c.value, direccion: d.value, valor: v.value, comision: com.value
            }, "confirmarCarga");
        }

        window.confirmarCarga = () => {
            document.getElementById('cliente').value = ""; document.getElementById('direccion').value = ""; 
            document.getElementById('valor').value = ""; document.getElementById('comision').value = "";
            document.getElementById('btn-cargar').innerText = "AÑADIR PEDIDO";
            cambiarPantalla('ruta');
        };

        function actualizarTodo() {
            llamarGoogle({}, "renderizarLista");
        }

        window.renderizarLista = (data) => {
            datosLocales = data.viajes;
            document.getElementById('saldo-header').innerText = `$${data.hoy.toLocaleString()}`;
            
            const listos = data.viajes.filter(v => v.estado === 'LISTO').length;
            const porcentaje = data.viajes.length > 0 ? (listos / data.viajes.length) * 100 : 0;
            document.getElementById('progress-bar').style.width = porcentaje + "%";

            const lista = document.getElementById('lista-viajes');
            lista.innerHTML = data.viajes.length === 0 ? "No hay pedidos hoy." : "";

            data.viajes.forEach(v => {
                const esListo = v.estado === 'LISTO';
                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-lg shadow border-l-4 ${esListo ? 'border-gray-300 opacity-50 grayscale' : 'border-green-500'} flex justify-between items-center`;
                div.innerHTML = `
                    <div class="text-left">
                        <div class="flex items-center gap-2"><h3 class="font-bold text-gray-800">${v.cliente}</h3><span class="bg-blue-100 text-blue-600 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">${v.comision || 'Cierre'}</span></div>
                        <p class="text-[11px] text-gray-500">${v.direccion}</p><p class="text-green-600 font-bold">$${v.valor}</p>
                    </div>
                    ${esListo ? '✅' : `<button onclick="marcarListo('${v.id}')" class="bg-green-600 text-white px-4 py-2 rounded text-xs font-bold shadow">LISTO</button>`}
                `;
                lista.appendChild(div);
            });
        };

        function marcarListo(id) {
            llamarGoogle({accion: "COMPLETAR_VIAJE", id: id}, "actualizarTodo");
        }

        function reiniciarDia() {
            if(confirm("¿Seguro? Se limpiará la pantalla de hoy (los datos ya están en el Excel).")) {
                location.reload(); 
            }
        }

        function descargarExcel() {
            if(datosLocales.length === 0) return alert("No hay datos para descargar.");
            let csv = "Cliente,Direccion,Valor,Tipo,Estado\n";
            datosLocales.forEach(v => {
                csv += `${v.cliente},${v.direccion},${v.valor},${v.comision},${v.estado}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Sanchez_Tracking_${new Date().toLocaleDateString()}.csv`);
            link.click();
        }
    </script>
</body>
</html>
