<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sánchez Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid white; font-weight: bold; background: #15803d; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-green-600 text-white sticky top-0 z-50 shadow-lg text-center">
        <div class="p-4">
            <h1 class="text-xl font-bold">Sánchez Tracking</h1>
            <p id="saldo-header" class="text-2xl font-bold text-yellow-300">$0</p>
        </div>
        <div class="flex bg-green-700">
            <button onclick="cambiarPantalla('carga')" id="tab-carga" class="flex-1 py-3 text-sm tab-active uppercase">Cargar</button>
            <button onclick="cambiarPantalla('ruta')" id="tab-ruta" class="flex-1 py-3 text-sm uppercase">Mi Ruta</button>
        </div>
    </header>

    <main id="pantalla-carga" class="p-4 max-w-md mx-auto">
        <div class="bg-white p-5 rounded-xl shadow-md space-y-3">
            <input type="text" id="cliente" placeholder="Cliente" class="w-full border p-3 rounded-lg outline-none">
            <input type="text" id="direccion" placeholder="Dirección" class="w-full border p-3 rounded-lg outline-none">
            <input type="number" id="valor" placeholder="Valor $" class="w-full border p-3 rounded-lg outline-none font-bold text-green-700">
            <button onclick="enviarComision()" id="btn-cargar" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-md active:bg-green-800 transition">AÑADIR A LA RUTA</button>
        </div>
    </main>

    <main id="pantalla-ruta" class="p-4 max-w-md mx-auto hidden">
        <div id="lista-viajes" class="space-y-3 text-center text-gray-400 mt-10 italic">Cargando...</div>
    </main>

    <script>
        const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; // <--- PEGA TU URL AQUÍ

        window.onload = actualizarTodo;

        function cambiarPantalla(p) {
            document.getElementById('pantalla-carga').classList.toggle('hidden', p !== 'carga');
            document.getElementById('pantalla-ruta').classList.toggle('hidden', p !== 'ruta');
            document.getElementById('tab-carga').classList.toggle('tab-active', p === 'carga');
            document.getElementById('tab-ruta').classList.toggle('tab-active', p === 'ruta');
            if(p === 'ruta') actualizarTodo();
        }

        async function enviarComision() {
            const c = document.getElementById('cliente');
            const d = document.getElementById('direccion');
            const v = document.getElementById('valor');
            if(!c.value || !v.value) return alert("Faltan datos");

            document.getElementById('btn-cargar').innerText = "GUARDANDO...";
            
            const url = `${SCRIPT_URL}?accion=AGREGAR_VIAJE&cliente=${encodeURIComponent(c.value)}&direccion=${encodeURIComponent(d.value)}&valor=${v.value}`;

            // Usamos una técnica de "imagen" para enviar datos sin errores de CORS
            const img = new Image();
            img.src = url;
            
            // Regla: vaciar campos
            setTimeout(() => {
                c.value = ""; d.value = ""; v.value = "";
                document.getElementById('btn-cargar').innerText = "AÑADIR A LA RUTA";
                cambiarPantalla('ruta');
            }, 1000);
        }

        async function actualizarTodo() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                document.getElementById('saldo-header').innerText = `$${data.hoy.toLocaleString()}`;
                const lista = document.getElementById('lista-viajes');
                lista.innerHTML = data.viajes.length === 0 ? "Sin viajes hoy." : "";
                
                data.viajes.forEach(v => {
                    const esListo = v.estado === 'LISTO';
                    const div = document.createElement('div');
                    div.className = `bg-white p-4 rounded-lg shadow border-l-4 border-green-500 flex justify-between items-center ${esListo ? 'opacity-40' : ''}`;
                    div.innerHTML = `
                        <div class="text-left"><h3 class="font-bold text-gray-800">${v.cliente}</h3><p class="text-xs text-gray-500">${v.direccion}</p><p class="text-green-600 font-bold">$${v.valor}</p></div>
                        ${esListo ? '<span>✅</span>' : `<button onclick="marcarListo('${v.id}')" class="bg-green-600 text-white px-3 py-2 rounded text-xs font-bold shadow">LISTO</button>`}
                    `;
                    lista.appendChild(div);
                });
            } catch (e) { console.log(e); }
        }

        function marcarListo(id) {
            const url = `${SCRIPT_URL}?accion=COMPLETAR_VIAJE&id=${id}`;
            const img = new Image();
            img.src = url;
            setTimeout(actualizarTodo, 800);
        }
    </script>
</body>
</html>
