<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sánchez Tracking Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 4px solid white; font-weight: bold; background: #15803d; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <header class="bg-green-600 text-white sticky top-0 z-50 shadow-lg text-center">
        <div class="p-4">
            <h1 class="text-xl font-bold italic uppercase tracking-tighter">Sánchez Tracking</h1>
            <p id="saldo-hoy" class="text-3xl font-black text-yellow-300">$0</p>
            <p class="text-[10px] uppercase font-bold opacity-80 italic tracking-widest">Ingreso Bruto Hoy</p>
            <div class="w-full bg-green-800 h-2 mt-3 rounded-full overflow-hidden border border-green-700">
                <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
        <div class="flex bg-green-700">
            <button onclick="cambiarPantalla('carga')" id="tab-carga" class="flex-1 py-3 text-xs tab-active uppercase">Cargar</button>
            <button onclick="cambiarPantalla('ruta')" id="tab-ruta" class="flex-1 py-3 text-xs uppercase">Mi Ruta</button>
        </div>
    </header>

    <main id="pantalla-carga" class="p-4 max-w-md mx-auto space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-md space-y-3 border-t-4 border-green-500">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">📦 Nuevo Pedido</h2>
            <input type="text" id="comision" placeholder="¿Lo que busca? (Sobre, Paquete, etc)" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 font-bold text-blue-600">
            <input type="text" id="direccion" placeholder="Dirección de entrega" class="w-full border-2 p-3 rounded-xl outline-none focus:border-green-500 font-bold">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="cliente" placeholder="Cliente" class="border-2 p-3 rounded-xl outline-none text-sm">
                <input type="number" id="valor" placeholder="Cobrar $" class="border-2 p-3 rounded-xl outline-none font-bold text-green-700 bg-green-50">
            </div>
            <button onclick="enviarComision()" id="btn-cargar" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase shadow-lg active:scale-95 transition-all">Añadir a la Ruta</button>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-md space-y-3 border-t-4 border-orange-400">
            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">⛽ Carga de Combustible</h2>
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="gas-importe" placeholder="Importe $" class="border-2 p-3 rounded-xl font-black text-orange-600 bg-orange-50 outline-none">
                <input type="number" id="gas-litros" placeholder="Litros" class="border-2 p-3 rounded-xl text-orange-600 font-bold bg-orange-50 outline-none">
            </div>
            <button onclick="enviarNafta()" id="btn-nafta" class="w-full bg-orange-500 text-white py-3 rounded-xl font-black uppercase text-xs active:bg-orange-700 shadow-md">Registrar Gasto</button>
        </div>

        <div class="bg-gray-800 text-white p-5 rounded-2xl shadow-inner text-center space-y-3">
            <p class="text-[10px] uppercase font-bold opacity-60 tracking-widest">Acumulado Histórico</p>
            <p id="saldo-historico" class="text-2xl font-black text-green-400">$0</p>
            <button onclick="generarPDF()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg text-[10px] font-black uppercase">Descargar Cierre PDF</button>
        </div>
    </main>

    <main id="pantalla-ruta" class="p-4 max-w-md mx-auto hidden space-y-4">
        <div id="lista-viajes" class="space-y-4"></div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyg5E0ETapCoHz06VqkTVV6fNUEgt8EFrbuVYlTiycptHstCugvfc-F8400Y7Gj9U_MMg/exec"; 
        let datosHoy = [];
        let gastoNaftaHoy = 0;

        window.onload = actualizarTodo;

        function cambiarPantalla(p) {
            document.getElementById('pantalla-carga').classList.toggle('hidden', p !== 'carga');
            document.getElementById('pantalla-ruta').classList.toggle('hidden', p !== 'ruta');
            document.getElementById('tab-carga').classList.toggle('tab-active', p === 'carga');
            document.getElementById('tab-ruta').classList.toggle('tab-active', p === 'ruta');
            if(p === 'ruta') actualizarTodo();
        }

        function llamarGoogle(params, callbackName) {
            const script = document.createElement('script');
            const queryString = Object.keys(params).map(key => key + '=' + encodeURIComponent(params[key])).join('&');
            script.src = `${SCRIPT_URL}?${queryString}&callback=${callbackName}`;
            document.body.appendChild(script);
            script.onload = () => script.remove();
        }

        function enviarComision() {
            const c = document.getElementById('cliente'), d = document.getElementById('direccion'), v = document.getElementById('valor'), com = document.getElementById('comision');
            if(!d.value || !com.value) return alert("Falta Dirección o qué busca");
            document.getElementById('btn-cargar').innerText = "GUARDANDO...";
            llamarGoogle({accion: "AGREGAR_VIAJE", cliente: c.value || "S/N", direccion: d.value, valor: v.value || 0, comision: com.value}, "confirmarCarga");
        }

        function enviarNafta() {
            const imp = document.getElementById('gas-importe'), lit = document.getElementById('gas-litros');
            if(!imp.value) return alert("Ingresá el importe");
            document.getElementById('btn-nafta').innerText = "REGISTRANDO...";
            llamarGoogle({accion: "CARGAR_NAFTA", importe: imp.value, litros: lit.value || 0}, "confirmarNafta");
        }

        window.confirmarCarga = (res) => {
            document.querySelectorAll('#pantalla-carga input').forEach(i => i.value = "");
            document.getElementById('btn-cargar').innerText = "Añadir a la Ruta";
            cambiarPantalla('ruta');
        };

        window.confirmarNafta = (res) => {
            document.getElementById('gas-importe').value = ""; document.getElementById('gas-litros').value = "";
            document.getElementById('btn-nafta').innerText = "Registrar Gasto";
            alert("Combustible registrado");
            actualizarTodo();
        };

        function actualizarTodo() {
            llamarGoogle({}, "renderizarInterfaz");
        }

        window.renderizarInterfaz = (data) => {
            if(!data) return;
            datosHoy = data.viajes || [];
            gastoNaftaHoy = data.nafta || 0;
            document.getElementById('saldo-hoy').innerText = `$${(data.hoy || 0).toLocaleString()}`;
            document.getElementById('saldo-historico').innerText = `$${(data.historico || 0).toLocaleString()}`;
            
            const listos = datosHoy.filter(v => v.estado === 'LISTO').length;
            const porcentaje = datosHoy.length > 0 ? (listos / datosHoy.length) * 100 : 0;
            document.getElementById('progress-bar').style.width = porcentaje + "%";

            const lista = document.getElementById('lista-viajes');
            lista.innerHTML = "";
            
            datosHoy.sort((a, b) => (a.estado === 'LISTO') - (b.estado === 'LISTO')).forEach(v => {
                const esListo = v.estado === 'LISTO';
                const div = document.createElement('div');
                div.className = `bg-white p-5 rounded-2xl shadow-sm border-l-[12px] transition-all ${esListo ? 'border-gray-300 opacity-50' : 'border-green-600'}`;
                
                div.innerHTML = `
                    <div class="flex flex-col w-full">
                        <div class="mb-2">
                            <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded uppercase">Lo que busca:</span>
                            <h2 class="text-2xl font-black text-blue-800 leading-tight uppercase mt-1">${v.comision}</h2>
                        </div>
                        <div class="mb-4">
                            <span class="text-[9px] font-black bg-gray-50 text-gray-400 px-2 py-1 rounded uppercase">Destino:</span>
                            <h3 class="text-xl font-bold text-gray-800 uppercase mt-1 leading-tight">${v.direccion}</h3>
                            <p class="text-[10px] text-gray-400 font-bold mt-1">CLIENTE: ${v.cliente}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            ${esListo 
                                ? '<span class="w-full text-center py-4 bg-gray-100 text-gray-400 font-black rounded-xl italic">ENTREGADO ✅</span>' 
                                : `
                                <button onclick="marcarListo(${v.id})" class="flex-[3] bg-green-600 text-white py-4 rounded-xl font-black uppercase shadow-md active:bg-green-700">Finalizar</button>
                                <div class="flex-1 text-center bg-green-50 py-2 rounded-xl border border-green-200">
                                    <p class="text-[8px] font-bold text-green-600 uppercase">Cobrar</p>
                                    <p class="text-sm font-black text-green-800">$${v.valor}</p>
                                </div>`
                            }
                        </div>
                    </div>
                `;
                lista.appendChild(div);
            });
        };

        function marcarListo(id) {
            event.target.innerText = "PROCESANDO...";
            event.target.disabled = true;
            llamarGoogle({accion: "COMPLETAR_VIAJE", id: id}, "actualizarTodo");
        }

        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const fecha = new Date().toLocaleDateString();
            
            doc.setFontSize(18);
            doc.setTextColor(21, 128, 61);
            doc.text("Sánchez Tracking - Cierre de Caja", 14, 20);
            
            const tableData = datosHoy.map(v => [v.comision, v.direccion, `$${v.valor.toLocaleString()}`, v.estado]);
            const totalBruto = datosHoy.reduce((acc, curr) => acc + parseFloat(curr.valor), 0);
            const neto = totalBruto - gastoNaftaHoy;

            doc.autoTable({
                startY: 30,
                head: [['Busca', 'Destino', 'Cobro', 'Estado']],
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [21, 128, 61] }
            });

            const finalY = doc.lastAutoTable.finalY + 15;
            doc.setFontSize(12);
            doc.setTextColor(0);
            doc.text(`Total Recaudado (Bruto): $${totalBruto.toLocaleString()}`, 14, finalY);
            doc.setTextColor(200, 0, 0);
            doc.text(`Gasto Combustible: - $${gastoNaftaHoy.toLocaleString()}`, 14, finalY + 8);
            
            doc.setDrawColor(200);
            doc.line(14, finalY + 12, 120, finalY + 12);
            
            doc.setFontSize(14);
            doc.setTextColor(21, 128, 61);
            doc.setFont(undefined, 'bold');
            doc.text(`TOTAL NETO GANANCIA: $${neto.toLocaleString()}`, 14, finalY + 22);
            
            doc.save(`Cierre_Sánchez_${fecha}.pdf`);
        }
    </script>
</body>
</html>
