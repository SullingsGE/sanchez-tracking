<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sánchez Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 4px solid white; font-weight: bold; background: #15803d; }
        #progress-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-green-600 text-white sticky top-0 z-50 shadow-lg text-center">
        <div class="p-4">
            <h1 class="text-xl font-bold italic">Sánchez Tracking</h1>
            <p id="saldo-header" class="text-2xl font-bold text-yellow-300">$0</p>
            
            <div class="w-full bg-green-800 h-3 mt-3 rounded-full overflow-hidden border border-green-700">
                <div id="progress-bar" class="bg-red-500 h-full" style="width: 0%"></div>
            </div>
            <p id="stats-text" class="text-[10px] uppercase mt-1 font-bold opacity-90">0 de 0 completados</p>
        </div>
        
        <div class="flex bg-green-700">
            <button onclick="cambiarPantalla('carga')" id="tab-carga" class="flex-1 py-3 text-sm tab-active uppercase">Cargar</button>
            <button onclick="cambiarPantalla('ruta')" id="tab-ruta" class="flex-1 py-3 text-sm uppercase">Mi Ruta</button>
        </div>
    </header>

    <main id="pantalla-carga" class="p-4 max-w-md mx-auto">
        <div class="bg-white p-5 rounded-xl shadow-md space-y-4">
            <h2 class="font-bold text-gray-600 border-b pb-2">📦 Cargar Pedido</h2>
            <input type="text" id="cliente" placeholder="Cliente" class="w-full border p-3 rounded-lg outline-none">
            <input type="text" id="direccion" placeholder="Dirección (Cualquier ciudad)" class="w-full border p-3 rounded-lg outline-none">
            
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="valor" placeholder="Valor $" class="w-full border p-3 rounded-lg outline-none font-bold text-green-700">
                <input type="text" id="comision" placeholder="¿Qué es? (Ej: Sobre)" class="w-full border p-3 rounded-lg outline-none text-blue-600">
            </div>
            
            <button onclick="enviarComision()" id="btn-cargar" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-md active:scale-95 transition uppercase">Añadir a la Ruta</button>
        </div>
    </main>

    <main id="pantalla-ruta" class="p-4 max-w-md mx-auto hidden">
        <div id="lista-viajes" class="space-y-3">
            <p class="text-center text-gray-400 mt-10 italic">Cargando pedidos...</p>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "TU_URL_AQUI"; // REEMPLAZA CON TU URL /exec

        window.onload = actualizarTodo;

        function cambiarPantalla(p) {
            document.getElementById('pantalla-carga').classList.toggle('hidden', p !== 'carga');
            document.getElementById('pantalla-ruta').classList.toggle('hidden', p !== 'ruta');
            document.getElementById('tab-carga').classList.toggle('tab-active', p === 'carga');
            document.getElementById('tab-ruta').classList.toggle('tab-active', p === 'ruta');
            if(p === 'ruta') actualizarTodo();
        }

        async function enviarComision() {
            const c = document.getElementById('cliente');
            const d = document.getElementById('direccion');
            const v = document.getElementById('valor');
            const com = document.getElementById('comision');

            if(!c.value || !v.value) return alert("Completá Cliente y Valor");

            const btn = document.getElementById('btn-cargar');
            btn.innerText = "GUARDANDO...";
            btn.disabled = true;

            const url = `${SCRIPT_URL}?accion=AGREGAR_VIAJE&cliente=${encodeURIComponent(c.value)}&direccion=${encodeURIComponent(d.value)}&valor=${v.value}&comision=${encodeURIComponent(com.value)}`;
            
            try {
                // Forzamos la espera de la respuesta de Google
                await fetch(url, { mode: 'no-cors' });
                
                // Vaciamos campos
                c.value = ""; d.value = ""; v.value = ""; com.value = "";
                btn.innerText = "Añadir a la Ruta";
                btn.disabled = false;
                
                // Cambiamos a la ruta y refrescamos
                cambiarPantalla('ruta');
            } catch(e) {
                alert("Error de conexión. El pedido se guardará en breve.");
                btn.disabled = false;
                btn.innerText = "Añadir a la Ruta";
            }
        }

        async function actualizarTodo() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                document.getElementById('saldo-header').innerText = `$${data.hoy.toLocaleString()}`;
                
                const total = data.viajes.length;
                const listos = data.viajes.filter(v => v.estado === 'LISTO').length;
                const porcentaje = total > 0 ? (listos / total) * 100 : 0;
                
                const bar = document.getElementById('progress-bar');
                bar.style.width = porcentaje + "%";
                if(porcentaje < 40) bar.className = "bg-red-500 h-full transition-all";
                else if(porcentaje < 80) bar.className = "bg-yellow-400 h-full transition-all";
                else bar.className = "bg-green-400 h-full transition-all";

                document.getElementById('stats-text').innerText = `${listos} de ${total} completados`;

                const lista = document.getElementById('lista-viajes');
                lista.innerHTML = total === 0 ? '<p class="text-center text-gray-400 mt-10">No hay pedidos hoy.</p>' : "";

                data.viajes.forEach(v => {
                    const esListo = v.estado === 'LISTO';
                    const div = document.createElement('div');
                    div.id = `card-${v.id}`;
                    div.className = `bg-white p-4 rounded-lg shadow border-l-4 ${esListo ? 'border-gray-300 opacity-50 grayscale' : 'border-green-500'} flex justify-between items-center transition-all`;
                    div.innerHTML = `
                        <div class="text-left">
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-gray-800">${v.cliente}</h3>
                                <span class="bg-blue-100 text-blue-600 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">${v.comision || 'Comisión'}</span>
                            </div>
                            <p class="text-[11px] text-gray-500">${v.direccion || 'Sin dirección'}</p>
                            <p class="text-green-600 font-bold text-lg mt-1">$${v.valor}</p>
                        </div>
                        <div id="status-${v.id}">
                            ${esListo ? '<span class="text-xl">✅</span>' : `<button onclick="marcarListo('${v.id}')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md">LISTO</button>`}
                        </div>
                    `;
                    lista.appendChild(div);
                });
            } catch (e) { console.log(e); }
        }

        function marcarListo(id) {
            const card = document.getElementById(`card-${id}`);
            const status = document.getElementById(`status-${id}`);
            card.classList.add('opacity-50', 'grayscale', 'border-gray-300');
            status.innerHTML = '<span class="text-xl">✅</span>';

            const url = `${SCRIPT_URL}?accion=COMPLETAR_VIAJE&id=${id}`;
            fetch(url, { mode: 'no-cors' });
            setTimeout(actualizarTodo, 1500);
        }
    </script>
</body>
</html>
